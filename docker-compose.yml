version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boardy-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - ./backend/storage:/var/www/storage
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      FILESYSTEM_DISK: public
      BROADCAST_DRIVER: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - boardy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boardy-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_URL: http://localhost:6001
    depends_on:
      - backend
    networks:
      - boardy-network

  redis:
    image: redis:7-alpine
    container_name: boardy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - boardy-network

  websocket:
    image: redis:7-alpine
    container_name: boardy-websocket
    ports:
      - "6001:6379"
    command: redis-server --appendonly yes
    volumes:
      - websocket-data:/data
    networks:
      - boardy-network

  nginx:
    image: nginx:alpine
    container_name: boardy-nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - boardy-network

volumes:
  redis-data:
  websocket-data:

networks:
  boardy-network:
    driver: bridge