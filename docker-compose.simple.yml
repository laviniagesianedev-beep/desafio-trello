services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    container_name: boardy-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: boardy-postgres
      DB_PORT: "5432"
      DB_DATABASE: boardy
      DB_USERNAME: boardy
      DB_PASSWORD: boardy_secret
      CACHE_STORE: database
      CACHE_DRIVER: database
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boardy-network

  frontend:
    image: node:20-alpine
    container_name: boardy-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "
      npm install &&
      npm run dev"
    environment:
      VITE_WS_URL: http://localhost:6001
    depends_on:
      - backend
    networks:
      - boardy-network

  postgres:
    image: postgres:16-alpine
    container_name: boardy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: boardy
      POSTGRES_USER: boardy
      POSTGRES_PASSWORD: boardy_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardy -d boardy"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - boardy-network

  redis:
    image: redis:7-alpine
    container_name: boardy-redis
    ports:
      - "6379:6379"
    profiles:
      - redis

volumes:
  pgdata:

networks:
  boardy-network:
    driver: bridge